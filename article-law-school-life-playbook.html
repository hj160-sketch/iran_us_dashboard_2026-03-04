    <h1>法学院生活实录：课程强度、阅读负荷与周计划模板</h1>
    <div class="meta">2026-03-06 · Law School Life</div>
    <p>法学院最难的不是某一门课，而是长期高强度节奏下的稳定执行。本篇重点给出可复用周计划。</p>
    <h2>每周结构</h2>
    <ul>
      <li>周一到周四：课程与案例阅读优先。</li>
      <li>周五：归纳课程要点，补齐未完成阅读。</li>
      <li>周末：复盘一周学习和下周预排。</li>
    </ul>
    <h2>执行要点</h2>
    <p>把“当天要做什么”拆成小任务；保证睡眠、运动与社交最小配置，避免短期爆发后长时间停摆。</p>
