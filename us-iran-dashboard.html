  <style>
    :root {
      --bg: #ffffff;
      --ink: #1d1d1f;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #0a84ff;
      --topbar-h: 44px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 0 24px 0 320px;
      min-height: 44px;
      border-bottom: 1px solid #ececf0;
      background: rgba(251, 251, 253, 0.9);
      backdrop-filter: saturate(180%) blur(18px);
      display: flex;
      align-items: center;
    }
    .floating-logo {
      position: fixed;
      top: 8px;
      left: 14px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .floating-logo svg {
      width: 280px;
      height: auto;
      display: block;
    }
    .brand {
      display: flex;
      align-items: center;
      margin-right: 30px;
    }
    .brand img,
    .brand svg {
      height: 34px;
      width: auto;
      display: block;
    }
    .actions {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      font-size: 13px;
      color: #1d1d1f;
      text-decoration: none;
      opacity: 0.92;
    }
    .dashboard-full {
      width: 100%;
      height: calc(100vh - var(--topbar-h));
      border: 0;
      display: block;
    }
    @media (max-width: 900px) {
      :root { --topbar-h: 64px; }
      .topbar { padding: 10px 12px 10px 148px; }
      .floating-logo { left: 8px; top: 8px; }
      .floating-logo svg { width: 130px; }
    }
  
    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .contact-icon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      flex: 0 0 16px;
      display: inline-block;
      position: relative;
      overflow: hidden;
    }
    .contact-icon--gmail {
      background: linear-gradient(135deg, #ea4335 0 33%, #fbbc05 33% 50%, #34a853 50% 67%, #4285f4 67% 100%);
      border-radius: 4px;
    }
    .contact-icon--gmail::before {
      content: "";
      position: absolute;
      inset: 2px;
      background: #fff;
      clip-path: polygon(0 14%, 50% 54%, 100% 14%, 100% 100%, 0 100%);
    }
    .contact-icon--gmail::after {
      content: "";
      position: absolute;
      left: 2px;
      right: 2px;
      top: 2px;
      height: 7px;
      background: linear-gradient(90deg, #ea4335 0 22%, transparent 22% 78%, #ea4335 78% 100%);
      clip-path: polygon(0 0, 50% 75%, 100% 0, 100% 100%, 0 100%);
    }
    .contact-icon--xhs {
      background: #ff2442;
      border-radius: 5px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25);
    }
    .contact-icon--xhs::before {
      content: "xhs";
      position: absolute;
      inset: 0;
      color: #fff;
      font-size: 7px;
      font-weight: 700;
      line-height: 16px;
      text-align: center;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      font-family: "Segoe UI", Arial, sans-serif;
    }

  </style>

    .site-footer__links a {

    .site-footer__links a:hover {

    @media (max-width: 720px) {
