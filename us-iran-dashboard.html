  <style>
    :root {
      --bg: #ffffff;
      --ink: #1d1d1f;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #0a84ff;
      --topbar-h: 44px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 0 24px 0 320px;
      min-height: 44px;
      border-bottom: 1px solid #ececf0;
      background: rgba(251, 251, 253, 0.9);
      backdrop-filter: saturate(180%) blur(18px);
      display: flex;
      align-items: center;
    }
    .floating-logo {
      position: fixed;
      top: 8px;
      left: 14px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .floating-logo svg {
      width: 280px;
      height: auto;
      display: block;
    }
    .brand {
      display: flex;
      align-items: center;
      margin-right: 30px;
    }
    .brand img,
    .brand svg {
      height: 34px;
      width: auto;
      display: block;
    }
    .actions {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      font-size: 13px;
      color: #1d1d1f;
      text-decoration: none;
      opacity: 0.92;
    }
    .dashboard-full {
      width: 100%;
      height: calc(100vh - var(--topbar-h));
      border: 0;
      display: block;
    }
    @media (max-width: 900px) {
      :root { --topbar-h: 64px; }
      .topbar { padding: 10px 12px 10px 148px; }
      .floating-logo { left: 8px; top: 8px; }
      .floating-logo svg { width: 130px; }
    }
  </style>

      color: #6b7280;

    @media (max-width: 720px) {
