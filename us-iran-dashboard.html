<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lyra Lab - 美国-伊朗交互分析看板</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #1d1d1f;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #0a84ff;
      --topbar-h: 44px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 0 24px 0 320px;
      min-height: 44px;
      border-bottom: 1px solid #ececf0;
      background: rgba(251, 251, 253, 0.9);
      backdrop-filter: saturate(180%) blur(18px);
      display: flex;
      align-items: center;
    }
    .floating-logo {
      position: fixed;
      top: 8px;
      left: 14px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .floating-logo svg {
      width: 280px;
      height: auto;
      display: block;
    }
    .brand {
      display: flex;
      align-items: center;
      margin-right: 30px;
    }
    .brand img,
    .brand svg {
      height: 34px;
      width: auto;
      display: block;
    }
    .actions {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      font-size: 13px;
      color: #1d1d1f;
      text-decoration: none;
      opacity: 0.92;
    }
    .dashboard-full {
      width: 100%;
      height: calc(100vh - var(--topbar-h));
      border: 0;
      display: block;
    }
    @media (max-width: 900px) {
      :root { --topbar-h: 64px; }
      .topbar { padding: 10px 12px 10px 148px; }
      .floating-logo { left: 8px; top: 8px; }
      .floating-logo svg { width: 130px; }
    }
  </style>
</head>
<body>
  <a class="floating-logo" href="index.html#index" aria-label="LyraLab 首页">
    <svg viewBox="0 0 320 64" role="img" aria-label="LyraLab">
      <circle cx="18" cy="22" r="6.5" fill="#0a84ff"></circle>
      <circle cx="34" cy="22" r="6.5" fill="#0a84ff" opacity="0.6"></circle>
      <circle cx="50" cy="22" r="6.5" fill="#0a84ff" opacity="0.35"></circle>
      <text x="74" y="28" font-size="19" font-weight="700" font-family="Avenir Next, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" fill="#1f2937">LyraLab</text>
      <text x="74" y="50" font-size="10.5" font-weight="500" font-family="Avenir Next, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" fill="#6b7280">莱拉的试验田</text>
    </svg>
  </a>
  <header class="topbar">
    <div class="actions">
      <a class="btn" href="legal-projects.html">项目-法律相关</a>
      <a class="btn" href="projects-tools.html">项目-其他/效率工具</a>
      <a class="btn" href="legal-articles.html">文章-JD申请/法学院生活/Big Law找工作</a>
    </div>
  </header>
  <iframe class="dashboard-full" src="iran_us_interactive_dashboard.html" title="美国-伊朗交互分析看板"></iframe>
</body>
</html>
