    <h1>JD 申请路线图：时间线、材料、推荐信与选校逻辑</h1>
    <div class="meta">2026-03-06 · JD Application</div>
    <p>这篇文章提供一个可执行的申请框架，目标是把“知道要申请”变成“每周都有清晰动作”。</p>
    <h2>时间线</h2>
    <ul>
      <li>提前 12-15 个月：准备 LSAT 与背景定位。</li>
      <li>提前 8-10 个月：完成简历初版、联系推荐人。</li>
      <li>提前 4-6 个月：文书打磨、学校组合与申请策略。</li>
      <li>提交季：按批次提交并跟进状态。</li>
    </ul>
    <h2>核心材料</h2>
    <p>个人陈述、简历、推荐信、成绩单与可选补充说明，建议统一版本管理，避免反复修改造成混乱。</p>
