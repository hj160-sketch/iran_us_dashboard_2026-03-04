<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lyra Lab - 页面已合并</title>
  <meta http-equiv="refresh" content="0; url=legal-projects.html" />
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --ink: #1d1d1f;
      --muted: #6b7280;
      --accent: #0a84ff;
      --line: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 0 24px 0 320px;
      min-height: 44px;
      border-bottom: 1px solid #ececf0;
      background: rgba(251, 251, 253, 0.9);
      backdrop-filter: saturate(180%) blur(18px);
      display: flex;
      align-items: center;
    }
    .floating-logo {
      position: fixed;
      top: 8px;
      left: 14px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .floating-logo svg {
      width: 280px;
      height: auto;
      display: block;
    }
    .topbar-actions {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }
    .nav-link {
      font-size: 13px;
      color: #1d1d1f;
      text-decoration: none;
      opacity: 0.92;
    }
    .nav-link.active {
      color: var(--accent);
      font-weight: 700;
    }
    .page-shell {
      min-height: calc(100vh - 44px);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 40px);
      letter-spacing: -0.03em;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }
    .card-actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 10px 16px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid var(--accent);
    }
    .btn.primary {
      background: var(--accent);
      color: #fff;
    }
    .btn.secondary {
      background: #fff;
      color: var(--accent);
    }
    @media (max-width: 900px) {
      .topbar { padding: 10px 12px 10px 148px; }
      .floating-logo { left: 8px; top: 8px; }
      .floating-logo svg { width: 130px; }
    }
  </style>
  <script>
    window.location.replace("legal-projects.html");
  </script>
</head>

      <circle cx="50" cy="22" r="6.5" fill="#0a84ff" opacity="0.35"></circle>
      <text x="74" y="28" font-size="19" font-weight="700" font-family="Avenir Next, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" fill="#1f2937">LyraLab</text>
      <text x="74" y="50" font-size="10.5" font-weight="500" font-family="Avenir Next, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" fill="#6b7280">&#33713;&#25289;&#30340;&#35797;&#39564;&#30000;</text>
    </svg>
  </a>
  <header class="topbar">
    <div class="topbar-actions">
      <a class="nav-link" href="index.html#about">&#20851;&#20110;&#25105;</a>
      <a class="nav-link active" href="legal-projects.html">&#39033;&#30446;</a>
      <a class="nav-link" href="legal-articles.html">&#25991;&#31456;</a>
      <a class="nav-link" href="life-travel.html">&#33258;&#23186;&#20307;-&#26053;&#28216;/Vlog</a>
    </div>
  </header>
  <div class="page-shell">
  <main class="card">
    <h1>页面已合并</h1>
    <p>“项目-其他/效率工具”页面已并入新的“项目”页，正在为你跳转。如果没有自动跳转，可以手动进入下方链接。</p>
    <div class="card-actions">
      <a class="btn primary" href="legal-projects.html">进入项目页</a>
      <a class="btn secondary" href="index.html#about">返回首页</a>
    </div>
  </main>
  </div>
</body>
</html>
