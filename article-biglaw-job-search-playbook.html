    <h1>Big Law 求职笔记：OCI、Networking 与面试准备清单</h1>
    <div class="meta">2026-03-06 · Big Law Career</div>
    <p>Big Law 求职链条长、节点多。把任务拆成阶段动作，比临近申请季临时准备更有效。</p>
    <h2>阶段任务</h2>
    <ul>
      <li>前置阶段：确定 practice area 兴趣，准备简历与写作样本。</li>
      <li>OCI 阶段：批量投递、面试排程、问题库准备。</li>
      <li>回合阶段：跟进反馈，针对性补充材料和 networking。</li>
    </ul>
    <h2>面试准备</h2>
    <p>重点不是背答案，而是形成你的故事线：为什么法律、为什么这个方向、为什么这家所，以及你能立即带来的价值。</p>
